<!doctype html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: Inter, sans-serif;
        color: #e6e6f0;
      }
      #main { position: relative; width: 100%; height: 100%; }
      .frame {
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        padding: 100px 140px;
      }
      .title {
        font-size: 72px;
        font-weight: 600;
        color: #ffffff;
        letter-spacing: -0.02em;
      }
      .kicker {
        margin-top: 18px;
        font-size: 24px;
        font-weight: 400;
        color: #6ee7b7;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <div id="main"
         data-composition-id="main"
         data-start="0"
         data-duration="3"
         data-width="1920"
         data-height="1080">
      <div class="frame">
        <div id="title" class="clip title"
             data-start="0" data-duration="3" data-track-index="0">
          V-Kernel + HyperFrames
        </div>
        <div id="kicker" class="clip kicker"
             data-start="0" data-duration="3" data-track-index="1">
          deterministic render &middot; audited &middot; reproducible
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from("#title",  { y: 30, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.2);
      tl.from("#kicker", { y: 18, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.5);
      tl.to(["#title","#kicker"], { opacity: 0, duration: 0.4, ease: "power2.in" }, 2.4);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
