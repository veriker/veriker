name: publish-to-pypi

# ─────────────────────────────────────────────────────────────────────────────
# PUBLISH veriker → PyPI via Trusted Publishing (OIDC). NO stored token.
#
# This is the FIRST workflow deliberately opted through the airlock to the PUBLIC
# repo (nexiverify/veriker). It must run THERE, because PyPI binds the trusted
# publisher to {owner=nexiverify, repo=veriker, workflow=publish.yml,
# environment=pypi}. The build job holds no credential; only the publish job
# carries `id-token: write`, and it only ever handles already-built artifacts.
#
# ONE-TIME SETUP (PyPI web, done by the maintainer):
#   pypi.org → Account → Publishing → "Add a pending publisher":
#     PyPI Project Name : veriker
#     Owner             : nexiverify
#     Repository name   : veriker
#     Workflow filename : publish.yml      (this file's basename — must match)
#     Environment name  : pypi             (must match `environment.name` below)
#
# TO PUBLISH: cut a GitHub Release on nexiverify/veriker (from the vX.Y.Z tag the
# airlock already pushed) → this runs on `release: published`. Or run it by hand
# from the Actions tab (workflow_dispatch) against a tag.
#
# IMMUTABILITY: a PyPI version can be uploaded exactly once. If 0.1.0 is already
# on PyPI this run will FAIL the upload — bump the version, don't fight it.
# ─────────────────────────────────────────────────────────────────────────────

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag/ref to build & publish (blank = the ref this was launched from)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Metadata + README render check
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/veriker
    permissions:
      id-token: write      # OIDC short-lived identity — the ONLY credential
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password:` — the action mints an OIDC token GitHub→PyPI at runtime.
